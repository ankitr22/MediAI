services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-Admin@123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medical_app}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pAdmin@123"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - mediai-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: on-failure
    env_file: .env
    environment:
      MYSQL_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mediai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mediai-net

volumes:
  mysql_data:

networks:
  mediai-net:
    driver: bridge
