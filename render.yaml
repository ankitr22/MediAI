databases:
  - name: medical-app-db
    databaseName: medical_app
    user: medical_user
    plan: free

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: medical-app-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_HOST
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MYSQL_HOST
        fromDatabase:
          name: medical-app-db
          property: host
      - key: MYSQL_PORT
        fromDatabase:
          name: medical-app-db
          property: port
      - key: MYSQL_USER
        fromDatabase:
          name: medical-app-db
          property: user
      - key: MYSQL_PASSWORD
        fromDatabase:
          name: medical-app-db
          property: password
      - key: MYSQL_DATABASE
        fromDatabase:
          name: medical-app-db
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Frontend (React + Vite) ────────────────────────────────────────────────
  - type: web
    name: medical-app-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: medical-app-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
